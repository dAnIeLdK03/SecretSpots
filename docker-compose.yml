services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: secretspots
      POSTGRES_USER: secretspots
      POSTGRES_PASSWORD: secretspots_local_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secretspots -d secretspots"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
