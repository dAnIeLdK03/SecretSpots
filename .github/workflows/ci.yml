name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: secretspots_test
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d secretspots_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SECRETSPOTS_TEST_CONNECTION_STRING: "Host=localhost;Port=5432;Database=secretspots_test;Username=${{ secrets.CI_DB_USER }};Password=${{ secrets.CI_DB_PASSWORD }}"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore

      - name: Build
        working-directory: backend
        run: dotnet build --no-restore --configuration Release

      - name: Test
        working-directory: backend
        run: dotnet test --no-build --configuration Release

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # Separate from backend/frontend above so a slow or flaky UI run never delays
  # their fast build/lint/typecheck feedback — it starts in parallel and reports
  # independently.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: secretspots_e2e
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U $POSTGRES_USER -d secretspots_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BACKEND_URL: http://localhost:5193
      FRONTEND_URL: http://localhost:3000
      MINIO_ROOT_USER: e2e-minio
      MINIO_ROOT_PASSWORD: e2e-minio-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # MinIO stands in for Cloudflare R2 (see docker-compose.yml) — it needs a
      # command argument the "services:" block can't pass, so it's a plain
      # container run as its own step instead of a service.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=$MINIO_ROOT_USER \
            -e MINIO_ROOT_PASSWORD=$MINIO_ROOT_PASSWORD \
            minio/minio server /data
          timeout 30 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Create MinIO bucket
        run: |
          aws --endpoint-url http://localhost:9000 s3 mb s3://secretspots-photos
        env:
          AWS_ACCESS_KEY_ID: ${{ env.MINIO_ROOT_USER }}
          AWS_SECRET_ACCESS_KEY: ${{ env.MINIO_ROOT_PASSWORD }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Restore & build backend
        working-directory: backend
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release

      - name: Apply database migrations
        working-directory: backend
        run: |
          dotnet tool restore
          dotnet ef database update --project src/SecretSpots.Features --startup-project src/SecretSpots.Api
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=secretspots_e2e;Username=${{ secrets.CI_DB_USER }};Password=${{ secrets.CI_DB_PASSWORD }}"

      - name: Start backend
        working-directory: backend
        run: |
          nohup dotnet run --no-build --configuration Release --project src/SecretSpots.Api > /tmp/backend.log 2>&1 &
          timeout 30 bash -c 'until curl -sf $BACKEND_URL/health; do sleep 1; done'
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: ${{ env.BACKEND_URL }}
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=secretspots_e2e;Username=${{ secrets.CI_DB_USER }};Password=${{ secrets.CI_DB_PASSWORD }}"
          Jwt__Secret: "e2e-only-jwt-signing-secret-not-used-anywhere-else"
          R2__AccessKeyId: ${{ env.MINIO_ROOT_USER }}
          R2__SecretAccessKey: ${{ env.MINIO_ROOT_PASSWORD }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.BACKEND_URL }}

      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run start > /tmp/frontend.log 2>&1 &
          timeout 30 bash -c 'until curl -sf $FRONTEND_URL/bg; do sleep 1; done'

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.FRONTEND_URL }}
          PLAYWRIGHT_API_URL: ${{ env.BACKEND_URL }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Show backend/frontend logs on failure
        if: failure()
        run: |
          echo "::group::backend.log"; cat /tmp/backend.log || true; echo "::endgroup::"
          echo "::group::frontend.log"; cat /tmp/frontend.log || true; echo "::endgroup::"
